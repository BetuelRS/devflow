name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm ci --legacy-peer-deps
      - run: npm run build -w shared 2>/dev/null; true
      - run: npx tsc --noEmit -p server/tsconfig.json
      - run: npx tsc --noEmit -p client/tsconfig.json

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm ci --legacy-peer-deps
      - run: npm run test -w server

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm ci --legacy-peer-deps
      - run: npm run test -w client

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm ci --legacy-peer-deps
      - run: npm run build -w server
      - run: npm run build -w client

  deploy:
    needs: [lint, test-server, test-client, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        if: secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
